# Prefer Dockerfile on Railway. This file is a fallback if Nixpacks is used.
[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt",
]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn webapp.main:app --host 0.0.0.0 --port $PORT"
